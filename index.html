<script>
/*!
 * Fall Kit · v1.0.0 · the shared cascade for every estate seed
 * MIT · Simon Gant · ai-nativesolutions.com · ◊·κ=1
 *
 * Inlineable JS module. Drop into any seed via <script> or copy-paste inline.
 * Preserves single-HTML sovereignty (no external deps until user opts in to T2 WebLLM).
 *
 * What it gives every seed:
 *  - AI tier picker: T0 (off · default) · T2 (WebLLM in-browser, 5 models 1B-70B) · T3 (BYOK Anthropic/OpenAI/Google)
 *  - Universal entry: FallKit.aiComplete(systemPrompt, userMsg, maxTokens) → string|null
 *  - AI chip UI in header
 *  - WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN)
 *  - Help section partial: FallKit.helpSection()
 *  - Settings panel: FallKit.openSettings()
 *
 * Doctrine (per botler CLAUDE.md):
 *  - T0 fallback ALWAYS works · aiComplete returns null · caller MUST degrade gracefully
 *  - NEVER hide a feature behind AI · NEVER proxy API keys · NEVER log keys
 *  - WebLLM is lazy-loaded · model weights download ONLY on user opt-in
 *
 * Estate-first canonical references:
 *  - WebLLM pattern: Downloads/botler/index.html (T0/T2/T3 cascade)
 *  - WebRTC pattern: Downloads/fallnet/fallnet-shim.js (raw RTCPeerConnection)
 *  - Konomi seal:    ◊·κ=1  (consistent across all estate seeds)
 *  - Mesh channel:   'fall-signal'
 */
(function (root) {
  'use strict';

  const FALL_KIT_VERSION = '1.2.0';
  const KCC_MINT_URL = 'https://sjgant80-hub.github.io/kcc-mint/';

  // ─── Model registry ──────────────────────────────────────────────
  const WEBLLM_MODELS = {
    'llama-1b':  { id: 'Llama-3.2-1B-Instruct-q4f16_1-MLC',   size: '~700MB', label: '1B · fast · any laptop / phone' },
    'llama-3b':  { id: 'Llama-3.2-3B-Instruct-q4f16_1-MLC',   size: '~2GB',   label: '3B · balanced · default · most laptops' },
    'qwen-7b':   { id: 'Qwen2.5-7B-Instruct-q4f16_1-MLC',     size: '~5GB',   label: '7B · capable · needs decent GPU (M-series Mac / 8GB+ VRAM)' },
    'llama-8b':  { id: 'Llama-3.1-8B-Instruct-q4f16_1-MLC',   size: '~5GB',   label: '8B · common · needs decent GPU' },
    'llama-70b': { id: 'Llama-3.1-70B-Instruct-q4f16_1-MLC',  size: '~40GB',  label: '70B · frontier · needs serious GPU + 64GB+ RAM' },
  };
  const DEFAULT_MODEL = 'llama-3b';

  const T3_PROVIDERS = {
    anthropic: { label: 'Anthropic Claude', models: ['claude-sonnet-4-5','claude-opus-4-7','claude-haiku-4-5'], default: 'claude-sonnet-4-5', url: 'https://api.anthropic.com/v1/messages' },
    openai:    { label: 'OpenAI',           models: ['gpt-4o','gpt-4o-mini','o1-mini'],                          default: 'gpt-4o-mini',      url: 'https://api.openai.com/v1/chat/completions' },
    google:    { label: 'Google Gemini',    models: ['gemini-1.5-pro','gemini-1.5-flash','gemini-2.0-flash-exp'], default: 'gemini-1.5-flash', url: 'https://generativelanguage.googleapis.com/v1beta/models/' },
  };

  // ─── State ───────────────────────────────────────────────────────
  const STATE = {
    config: loadConfig(),
    ai: { ready: false, loading: false, progress: 0, engine: null, model: null },
    mesh: { active: false, peers: new Map(), bc: null, signal: null },
  };

  function loadConfig() {
    try { return JSON.parse(localStorage.getItem('fall-kit.config') || '{}'); }
    catch (e) { return {}; }
  }
  function saveConfig() {
    try { localStorage.setItem('fall-kit.config', JSON.stringify(STATE.config)); } catch (e) {}
  }

  // ─── DOM helpers ─────────────────────────────────────────────────
  function $(s, root) { return (root || document).querySelector(s); }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

  // ─── AI tier ─────────────────────────────────────────────────────
  function aiTier() { return STATE.config.ai_tier || 'T0'; }

  function renderAiChip() {
    const chip = $('#fk-ai-chip');
    if (!chip) return;
    const txt = $('#fk-ai-chip-text');
    chip.classList.remove('fk-chip-live', 'fk-chip-loading', 'fk-chip-warn');
    const tier = aiTier();
    if (tier === 'T0') { txt.textContent = 'T0 · off'; }
    else if (tier === 'T2') {
      if (STATE.ai.ready) { txt.textContent = 'T2 ' + (WEBLLM_MODELS[STATE.config.webllm_model || DEFAULT_MODEL]?.label.split(' · ')[0] || '') + ' · ready'; chip.classList.add('fk-chip-live'); }
      else if (STATE.ai.loading) { txt.textContent = 'T2 loading ' + Math.round(STATE.ai.progress) + '%'; chip.classList.add('fk-chip-loading'); }
      else { txt.textContent = 'T2 · click to load'; chip.classList.add('fk-chip-warn'); }
    } else if (tier === 'T3') {
      if (STATE.config.api_key) { txt.textContent = 'T3 ' + (T3_PROVIDERS[STATE.config.api_provider]?.label || 'BYOK') + ' · active'; chip.classList.add('fk-chip-live'); }
      else { txt.textContent = 'T3 · no key set'; chip.classList.add('fk-chip-warn'); }
    }
  }

  async function loadWebLLM(modelKey) {
    if (STATE.ai.loading) return;
    const key = modelKey || STATE.config.webllm_model || DEFAULT_MODEL;
    const model = WEBLLM_MODELS[key];
    if (!model) { console.error('fall-kit: unknown model', key); return; }
    if (STATE.ai.ready && STATE.ai.model === model.id) return;
    STATE.ai.loading = true; STATE.ai.progress = 0; renderAiChip();
    notify('Loading WebLLM · ' + model.label + ' · ' + model.size + ' first time', 'info');
    try {
      const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm@0.2.79');
      const engine = await CreateMLCEngine(model.id, {
        initProgressCallback: p => { STATE.ai.progress = (p.progress || 0) * 100; renderAiChip(); }
      });
      STATE.ai.engine = engine;
      STATE.ai.model = model.id;
      STATE.ai.ready = true;
      STATE.ai.loading = false;
      STATE.config.webllm_model = key; saveConfig();
      renderAiChip();
      notify('WebLLM ready · sovereign mode · ' + model.label.split(' · ')[0], 'ok');
    } catch (e) {
      console.error('fall-kit: WebLLM load failed', e);
      STATE.ai.loading = false; renderAiChip();
      notify('WebLLM load failed · ' + e.message, 'err');
    }
  }

  async function aiComplete(systemPrompt, userMsg, maxTokens) {
    maxTokens = maxTokens || 600;
    const tier = aiTier();
    if (tier === 'T2' && STATE.ai.ready && STATE.ai.engine) {
      const r = await STATE.ai.engine.chat.completions.create({
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMsg }],
        max_tokens: maxTokens,
      });
      return r.choices[0].message.content;
    }
    if (tier === 'T3' && STATE.config.api_key && STATE.config.api_provider) {
      return await aiCloudCall(systemPrompt, userMsg, maxTokens);
    }
    return null;
  }

  async function aiCloudCall(sys, msg, maxTokens) {
    const provider = STATE.config.api_provider;
    const key = STATE.config.api_key;
    const model = STATE.config.api_model || T3_PROVIDERS[provider]?.default;
    if (provider === 'anthropic') {
      const r = await fetch(T3_PROVIDERS.anthropic.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model, max_tokens: maxTokens, system: sys, messages: [{ role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('Anthropic ' + r.status + ': ' + (await r.text()).slice(0, 200));
      const j = await r.json();
      return j.content[0].text;
    }
    if (provider === 'openai') {
      const r = await fetch(T3_PROVIDERS.openai.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: 'system', content: sys }, { role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('OpenAI ' + r.status);
      const j = await r.json();
      return j.choices[0].message.content;
    }
    if (provider === 'google') {
      const r = await fetch(T3_PROVIDERS.google.url + model + ':generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: sys + '\n\n---\n\n' + msg }] }], generationConfig: { maxOutputTokens: maxTokens } }),
      });
      if (!r.ok) throw new Error('Google ' + r.status);
      const j = await r.json();
      return j.candidates[0].content.parts[0].text;
    }
    throw new Error('unknown provider: ' + provider);
  }

  // ─── WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN) ───
  const MESH_CHANNEL = 'fall-signal';
  const STUN_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];
  function meshStart(opts) {
    if (STATE.mesh.active) return;
    opts = opts || {};
    const seedId = opts.seedId || (location.pathname + '#' + Math.random().toString(36).slice(2, 8));
    STATE.mesh.seedId = seedId;
    try { STATE.mesh.bc = new BroadcastChannel(MESH_CHANNEL); }
    catch (e) { console.warn('fall-kit: BroadcastChannel unavailable'); return; }
    STATE.mesh.bc.onmessage = e => {
      const m = e.data;
      if (!m || !m.kind || m.peerId === seedId) return;
      if (opts.onMessage) opts.onMessage(m);
    };
    STATE.mesh.bc.postMessage({ kind: 'fall-kit:hello', peerId: seedId, ts: Date.now(), seedName: opts.seedName || 'unknown' });
    STATE.mesh.active = true;
    notify('Mesh active · channel ' + MESH_CHANNEL, 'ok');
  }

let db;
const STORES=['state','clients','advisers','firms','matters','timeEntries','invoices','clientAccount','officeAccount','expenses','disbursements','piPolicies','audit'];
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(STORE,1);r.onupgradeneeded=e=>{const d=e.target.result;for(const s of STORES){if(!d.objectStoreNames.contains(s)){d.createObjectStore(s,{keyPath:'id'})}}};r.onsuccess=e=>{db=e.target.result;res(db)};r.onerror=()=>rej(r.error)})}
function txStore(name,mode='readonly'){const tx=db.transaction(name,mode);return tx.objectStore(name)}
function idbPut(store,val){return new Promise(r=>{const req=txStore(store,'readwrite').put(val);req.onsuccess=()=>r(true);req.onerror=()=>r(false)})}
function idbDel(store,key){return new Promise(r=>{const req=txStore(store,'readwrite').delete(key);req.onsuccess=()=>r(true)})}
function idbGetAll(store){return new Promise(r=>{const req=txStore(store).getAll();req.onsuccess=()=>r(req.result||[]);req.onerror=()=>r([])})}
function idbGet(store,key){return new Promise(r=>{const req=txStore(store).get(key);req.onsuccess=()=>r(req.result);req.onerror=()=>r(null)})}

async function appendAudit(action,reasoning,payload){
 if(!state.settings.auditChain)return;
 const prev=state.audit.length?state.audit[state.audit.length-1]:null;
 const prevHash=prev?prev.hash:'';
 const docHash=await sha256(JSON.stringify(payload||{}));
 const i=(prev?prev.i:0)+1;
 const ts=Date.now();
 const hash=await sha256(prevHash+docHash+ts+i);
 const entry={id:'au_'+i+'_'+ts,i,ts,tool:TOOLNAME,configVersion:TOOLNAME+'@'+VERSION,adviserId:payload?.adviserId||'',clientId:payload?.clientId||'',matterId:payload?.matterId||'',action,reasoning:reasoning||'',prevHash,docHash,hash,retentionYears:RULES.retentionYears,payload:payload||{}};
 state.audit.push(entry);
 if(state.audit.length>5000)state.audit=state.audit.slice(-5000);
 await idbPut('audit',entry);
}

function mattersForAdviser(id){return state.matters.filter(m=>m.responsibleSolicitorId===id||m.supervisingPartnerId===id)}
function timeForMatter(id){return state.timeEntries.filter(t=>t.matterId===id)}
function timeForAdviser(id){return state.timeEntries.filter(t=>t.adviserId===id)}
function billableTimeForMatter(id){return timeForMatter(id).filter(t=>t.billable)}
function wipForMatter(id){return billableTimeForMatter(id).reduce((a,t)=>a+(t.minutes/60)*(t.rate||0),0)}
function disbForMatter(id){return state.disbursements.filter(d=>d.matterId===id).reduce((a,d)=>a+(d.total||0),0)}
function billedForMatter(id){return state.invoices.filter(i=>i.matterId===id).reduce((a,i)=>a+(i.total||0),0)}
function clientAccountByMatter(id){
 let bal=0;
 for(const e of state.clientAccount){if(e.matterId!==id)continue;if(e.direction==='in')bal+=(e.amount||0);else bal-=(e.amount||0)}
 return bal;
}
function clientAccountTotalHeld(){let t=0;for(const e of state.clientAccount){if(e.direction==='in')t+=(e.amount||0);else t-=(e.amount||0)}return t}
function officeAccountBalance(){let t=0;for(const e of state.officeAccount){if(e.direction==='in')t+=(e.amount||0);else t-=(e.amount||0)}return t}
function unreconciledClientAcct(){return state.clientAccount.filter(e=>!e.reconciledAt)}
function lastReconciliation(){const r=state.clientAccount.filter(e=>e.reconciliationOf).sort((a,b)=>b.ts-a.ts);return r[0]||null}
function daysSinceReconciliation(){const l=lastReconciliation();if(!l)return 999;return daysBetween(l.ts,now())}
function unsplitMixed(){return state.clientAccount.filter(e=>e.source==='mixed'&&!e.splitAt)}
function unsplitMixedOver2Days(){return unsplitMixed().filter(e=>hoursBetween(e.ts,now())>RULES.sraTwoDayHours)}
function interestWatchEntries(){
 const out=[];
 const byMatter={};
 for(const e of state.clientAccount){if(!byMatter[e.matterId])byMatter[e.matterId]=[];byMatter[e.matterId].push(e)}
 for(const mid of Object.keys(byMatter)){
 let bal=0,since=null;
 const arr=byMatter[mid].slice().sort((a,b)=>a.ts-b.ts);
 for(const e of arr){
 if(e.direction==='in')bal+=(e.amount||0);else bal-=(e.amount||0);
 if(bal>=RULES.sraInterestThreshold){if(!since)since=e.ts}else{since=null}
 }
 if(bal>=RULES.sraInterestThreshold&&since){const weeks=(now()-since)/(7*dayMs);if(weeks>=RULES.sraInterestWeeks){const mt=state.matters.find(m=>m.id===mid);out.push({matterId:mid,matter:mt,balance:bal,weeks:weeks.toFixed(1),since:isoDate(since)})}}
 }
 return out;
}
function ytdRevenue(){const y=new Date().getFullYear();return state.invoices.filter(i=>new Date(i.ts).getFullYear()===y).reduce((a,i)=>a+(i.total||0),0)}
function mtdRevenue(){const m=monthKey(now());return state.invoices.filter(i=>monthKey(i.ts)===m).reduce((a,i)=>a+(i.total||0),0)}
function totalWIP(){return state.matters.reduce((a,m)=>a+wipForMatter(m.id),0)}
function expensesForMonth(m){return state.expenses.filter(e=>e.month===m)}
function expensesTotal(m){return expensesForMonth(m).reduce((a,e)=>a+(e.amount||0),0)}
function piMonthlyAccrual(){return Math.round((state.settings.piAnnualPremium||0)/12)}
function piDaysToExpiry(){if(!state.firm?.piExpiresAt)return null;return daysBetween(now(),state.firm.piExpiresAt)}
function realisationRate(adviserId){
 const tte=timeForAdviser(adviserId).filter(t=>t.billable);
 if(!tte.length)return 0;
 const recordedValue=tte.reduce((a,t)=>a+(t.minutes/60)*(t.rate||0),0);
 // attributable billed: invoices for matters where this adviser logged time
 const matterIds=Array.from(new Set(tte.map(t=>t.matterId)));
 const billed=state.invoices.filter(i=>matterIds.includes(i.matterId)).reduce((a,i)=>a+(i.profitCosts||0),0);
 if(!recordedValue)return 0;
 return Math.min(billed/recordedValue,1.5);
}

Where a payment is received containing **both client money and office money**, you must promptly determine the split and either:
- pay the whole sum into the **client account** and transfer the office-money portion out, or
- pay the office portion to office account and the client portion to client account, **within 14 days** of receipt (rule 4.1) — with same-day discipline being best practice.

The legacy "two-day rule" colloquialism reflects how COFAs operationalise this — most firms move split funds within **2 working days** of identifying the breakdown. Failing to split is a Rule 2.5 / 4.1 breach.

 {id:'sra-7-1',match:/7\.1|interest|client interest/i,answer:()=>`**SRA Accounts Rules · Rule 7.1 (interest):**

You must account to the client (or third party for whom money is held) for a **fair sum of interest** on client money held by you.

The rule is principle-based — no statutory minimum — but common firm policies treat de minimis as:
- balances under **£${RULES.sraInterestThreshold}**, or
- held for fewer than **${RULES.sraInterestWeeks} weeks**.

The firm's written interest policy must be published and applied consistently. Higher balances or longer holds attract interest at a market rate; under-pay is recoverable + disciplinary risk.

Watch list right now: ${interestWatchEntries().length} matter(s) over threshold > ${RULES.sraInterestWeeks} weeks.`},
 {id:'client-v-office',match:/client (vs|v|or) office|two account|office account|separate account/i,answer:()=>`**Client account vs Office account:**

| | **Client account** | **Office account** |
|---|---|---|
| Owns | Held *on trust* for clients | Firm's own money |
| Source | Money received belonging to client / 3rd party | Fees, expenses, capital |
| Mixing | Strictly forbidden (rule 4) | n/a |
| Reconciliation | Every 5 weeks (rule 8.3) | Per firm policy |
| Withdrawal | Only per rules 5.1 (e.g. paying client, paying disbursement) | Per firm authority |
| Risk if breached | Disciplinary intervention, sometimes criminal | Bookkeeping |

A solicitor firm **must** have a separate designated client bank account — typically marked "client account" on the bank's records and on letterhead. Falllegalpractice tracks both as separate IDB stores.

Held now: ${money(clientAccountTotalHeld())} client · ${money(officeAccountBalance())} office.`},
 {id:'colp-cofa',match:/colp|cofa|compliance officer/i,answer:()=>`**COLP & COFA — SRA Authorisation Rules 8.5:**

Every authorised firm must designate:
- **COLP** — Compliance Officer for Legal Practice — responsible for material breaches of SRA Standards & Regulations.
- **COFA** — Compliance Officer for Finance & Administration — responsible for the firm's compliance with **SRA Accounts Rules** specifically.

Both must be approved by the SRA, be a manager or employee of the firm, and (for COLP) be a solicitor. Material breaches must be reported to the SRA "promptly" (typically within days of identification).

Your firm: COLP = **${esc(state.advisers.find(a=>a.id===state.settings.colpId)?.name||'(not set — open Settings)')}** · COFA = **${esc(state.advisers.find(a=>a.id===state.settings.cofaId)?.name||'(not set)')}**.`},
 {id:'pii-min',match:/pi+ (insurance|minimum|cover|policy)|professional indemnit/i,answer:()=>`**SRA PII — minimum terms & conditions:**

- **Minimum cover** · £${(RULES.piMinCover/1000000).toFixed(0)}m per claim for incorporated practices · £2m per claim for unlimited/LLPs.
- **Mandatory terms** · "any one claim" basis, must not exclude dishonesty of the firm (only the actual dishonest individual), must include run-off cover.
- **Run-off** · 6 years' run-off triggered automatically on firm cessation; estimated as up to 300% of last annual premium.
- Cover from a **Participating Insurer** on the SRA-approved list.
- Common renewal date: **1 October** (legacy CRD), though now staggered.

Your firm: ${esc(state.firm?.piInsurer||'(insurer not set)')} · policy ${esc(state.firm?.piPolicyNo||'(none)')} · cover ${money(state.firm?.piCoverAmount||0)} · expires ${state.firm?.piExpiresAt?isoDate(state.firm.piExpiresAt):'(not set)'} · ${piDaysToExpiry()!==null?'in '+piDaysToExpiry()+'d':''}.`},
 {id:'cpd',match:/cpd|continuing|professional develop|competen/i,answer:()=>`**SRA Competence Statement & CPD:**

Since 2016 the SRA replaced the prescriptive 16-hours CPD rule with the **Competence Statement** + **Continuing Competence** approach. However, **${RULES.cpdAnnualHours} hours per practice year** remains the de facto industry benchmark (many firms still operationalise it).

What you must do:
1. Reflect on practice annually — identify learning needs.
2. Address those needs (courses, reading, peer review, work-based learning).
3. Record activities + outcomes.
4. Declare on practising-certificate renewal that you've done so.

Your advisers: ${state.advisers.map(a=>esc(a.name)+' '+(a.cpdHoursThisYear||0).toFixed(1)+'h').join(' · ')||'(none)'}.`},
 {id:'aml',match:/aml|money laundering|supervis/i,answer:()=>`**AML supervision for solicitors:**

Solicitor firms are **supervised** for AML by either:
- the **SRA** (default for SRA-authorised firms), or
- the **Council for Licensed Conveyancers** (for CLC firms), or
- HMRC (rare for solicitors — usually only TCSPs).

Annual supervision fee paid via PC renewal portal. The firm must:
- Appoint **MLRO** (Money Laundering Reporting Officer) + **MLCO** (Compliance Officer).
- Maintain a written firm-wide risk assessment.
- Apply CDD per JMLSG / MLR 2017 thresholds.
- Submit annual AML information return to the SRA (when prompted).

Your firm: supervised by **${esc(state.firm?.amlSupervisor||state.settings.amlSupervisor||'(not set)')}**.`},
 {id:'vat-disb',match:/vat.+(disbursement|expense)|vatable.+disbur/i,answer:()=>`**VAT on disbursements (the difficult bit):**

A genuine disbursement is **outside the scope of VAT** if **all** of these are true (HMRC VAT Notice 700/24 / Brabners principle):
1. The supplier's service is made to the **client** (not the firm).
2. The client knew about it and was responsible for it.
3. The client authorised the firm to pay on their behalf.
4. The disbursement is **separately itemised** on the bill at exact cost (no mark-up).
5. The firm received and recorded it as a payment for the client.

Typical disbursements meeting this test:
- **Court fees** (HMCTS) — no VAT.
- **Land Registry fees** — no VAT.
- **Companies House** fees — no VAT.
- **Counsel's fees** — VATable (counsel charges VAT; see Counsel question).
- **Search fees** — depends on supplier; many are now treated as firm's purchase (vatable) post-Brabners.
- **Expert reports** — vatable (the firm purchases the report).
- **Oath fees** — outside scope.
- **Travel & subsistence** — almost always firm cost, vatable.

If unsure → safer to treat as a firm cost and add VAT.`},
 {id:'disb-no-vat',match:/disbursement.*no vat|outside.*scope|court fee.*vat/i,answer:()=>`**Disbursements without VAT (outside scope):**

Common UK solicitor disbursements that are **outside the scope of VAT**:

- **Court fees** (HMCTS) — N1, N9, N244 etc.
- **Land Registry** fees (HMLR) — searches, registration, OS1.
- **Companies House** filings.
- **Oath / statutory declaration fees** (to the swearer-commissioner, not when the firm administers).
- **Probate registry** application fees.
- **Stamp duty land tax** (SDLT) paid as agent.
- **HMCTS bankruptcy / IVA fees**.

Common disbursements that **are vatable** (the firm is the customer):
- Counsel's fees (counsel charges VAT — pass-through).
- Expert / surveyor / medical reports.
- Search agency fees (Index West, NLIS searches) — post-Brabners.
- Process-server fees.

On your bill, separate the two categories so the client sees exactly what VAT was charged on what.`},
 {id:'counsel',match:/counsel|barrister|fee.*counsel/i,answer:()=>`**Counsel's fees — three competing treatments:**

1. **Concession (agency)** — HMRC concession allows counsel's fee to be treated as a disbursement *to the client* if invoice is in **client's name** and the firm is acting as agent. Most common for instructing chambers in CFA-funded work. VAT is then visible separately.

2. **Firm's cost (re-supply)** — firm pays counsel's invoice (in firm's name), adds it to its own profit costs with VAT charged on the whole. Means client sees one VAT line, simpler.

3. **Modern (post-Brabners)** — HMRC increasingly treats services to the firm-as-customer as a firm cost, so option (2) is typically the safer treatment.

Whatever you choose, **be consistent within a matter** and reflect it on the bill clearly. For CFA / DBA matters where success fee is in play, counsel's fees may be subject to the cap on recoverability — check the funding agreement.`},
 {id:'time-unit',match:/(6|six).?min(ute)?|time recording|unit/i,answer:()=>`**Time recording — the 6-minute unit:**

The industry-standard solicitor billing unit is **6 minutes** (1/10 of an hour). At a £${state.settings.hourlyRate||285}/hr rate that's **£${((state.settings.hourlyRate||285)/10).toFixed(2)} per unit**.

Why 6 minutes?
- Granular enough to capture short phone calls and emails as 1 unit.
- Round enough for narrative entry (most tasks naturally take 1-12 units).
- Aligns with Guideline Hourly Rates (GHR) used by the courts in assessment.

Every billable activity should have:
- **Date** of work.
- **Time keeper** (adviser id).
- **Activity code** (attendance · drafting · review · research · travel · waiting · telephone · etc.).
- **Units** (multiples of 6 min).
- **Narrative** ≥ 1 line; minimal narrative will be reduced on inter-partes assessment.

Your default rate: **£${state.settings.hourlyRate||285}/hr** · adjust per-matter via the matter detail.`},
 {id:'transfer-earned',match:/transfer.*(earned|fee|out)|withdraw.*(fees|costs)/i,answer:()=>`**Transferring earned fees out of client account (rule 4.3):**

When you've delivered a bill of costs to the client and the funds to satisfy it are held in client account, you may transfer the relevant sum to office account.

Conditions:
- A **bill of costs or written notification of costs** has been delivered to the client.
- The transfer is for the amount of those costs only (no more).
- Transfer is made **promptly** (industry practice = within days).

Leaving fees in client account **after** they've been earned is a Rule 2 breach. Pulling more than billed = a Rule 4 breach. Pulling without a bill = a Rule 4.3 breach.

Best practice: weekly "earned-but-undrawn" sweep, double-signed by COFA + responsible solicitor, evidenced in the audit chain.`},
 {id:'stale-balances',match:/stale|residual|small balance|dormant|abandon/i,answer:()=>`**Stale / residual client-account balances (rule 5.1(c)):**

Where money is left on a client matter after the work is concluded and you've made reasonable attempts to return it, you may:
- **Donate to charity** if the balance is £500 or less — keeping a record of:
 - the amount, the matter, the steps taken to return,
 - the date and charity, and
 - an indemnity in case the client later claims.
- For balances **over £500**, you must apply to the SRA for permission (the "prescribed circumstances" route).
- Keep records for **6 years** minimum.

Don't let residual balances accumulate — most SRA-intervention cases start here. Run a quarterly stale-balance review (matter inactive > 6 months + balance > £0).`},
];

YTD revenue: ${money(ytdRevenue())} · Total WIP: ${money(totalWIP())}`;

async function reconcileNow(){
 const bankBalStr=prompt('Bank balance for client account (£):',clientAccountTotalHeld().toFixed(2));
 if(bankBalStr===null)return;
 const bankBal=parseFloat(bankBalStr)||0;
 const ledgerBal=clientAccountTotalHeld();
 const diff=(bankBal-ledgerBal).toFixed(2);
 const adjStr=prompt('Adjustments / supporting notes:','Ledger '+moneyP(ledgerBal)+' · Bank '+moneyP(bankBal)+' · Δ '+moneyP(diff));
 const docHash=await sha256(JSON.stringify({bankBal,ledgerBal,diff,notes:adjStr}));
 const e={id:'ca_'+uid(),matterId:'',clientId:'',ts:now(),dateOf:isoDate(now()),direction:'in',amount:0,source:'office',notes:'RECONCILIATION (rule 8.3) · '+(adjStr||''),reconciledAt:now(),reconciliationOf:{bankBal,ledgerBal,diff,docHash,by:state.settings.cofaId||''}};
 state.clientAccount.push(e);await idbPut('clientAccount',e);
 for(const ce of state.clientAccount){if(!ce.reconciledAt&&ce.id!==e.id){ce.reconciledAt=now();await idbPut('clientAccount',ce)}}
 await appendAudit('reconciliation.done','User performed rule 8.3 reconciliation',{bankBal,ledgerBal,diff,docHash});
 broadcastReconciliation({ts:now(),bankBal,ledgerBal,diff});
 toast('reconciled');render();
}
async function splitMixed(id){

 const offPart=(e.amount||0)-cliPart;
 e.splitAt=now();e.source='client';e.amount=cliPart;e.notes=(e.notes||'')+' [split: client £'+cliPart.toFixed(2)+']';
 await idbPut('clientAccount',e);
 if(offPart>0){

 const rows=state.timeEntries.map(t=>{const m=state.matters.find(x=>x.id===t.matterId);const a=state.advisers.find(x=>x.id===t.adviserId);const value=((t.minutes/60)*(t.rate||0)).toFixed(2);return [t.id,t.dateOf||isoDate(t.ts),m?m.ref:'',a?a.name:'',t.activity,t.units,t.minutes,(t.narrative||'').replace(/"/g,'""'),t.billable?1:0,t.rate,value].map(v=>typeof v==='string'?'"'+v+'"':v).join(',')});

async function importTimeCSV(ev){
 const f=ev.target.files[0];if(!f)return;
 const text=await f.text();
 const lines=text.split(/\r?\n/).filter(l=>l.trim());
 if(lines.length<2){toast('empty CSV');return}
 const head=lines[0].split(',').map(s=>s.replace(/"/g,'').trim());
 let added=0;
 for(let i=1;i<lines.length;i++){
 const row=lines[i].match(/("([^"]|"")*"|[^,]+)/g)||[];
 const obj={};head.forEach((k,j)=>{obj[k]=(row[j]||'').replace(/^"|"$/g,'').replace(/""/g,'"').trim()});
 if(!obj.activity)continue;
 const mt=state.matters.find(m=>m.ref===obj.matterRef);
 const adv=state.advisers.find(a=>a.name===obj.adviserName);
 if(!mt||!adv)continue;
 const minutes=parseInt(obj.minutes)||(parseInt(obj.units)||0)*RULES.unitMinutes;
 const t={id:'te_'+uid(),matterId:mt.id,adviserId:adv.id,ts:new Date(obj.dateOf||isoDate(now())).getTime(),dateOf:obj.dateOf||isoDate(now()),activity:obj.activity,units:parseInt(obj.units)||Math.round(minutes/RULES.unitMinutes),minutes,narrative:obj.narrative||'',billable:obj.billable==='1'||obj.billable==='true',rate:parseFloat(obj.rate)||state.settings.hourlyRate||285};
 state.timeEntries.push(t);await idbPut('timeEntries',t);added++;
 }
 await appendAudit('time.bulk.import','User imported CSV',{count:added});
 toast(added+' time entries imported');render();
}

function recalcInvoicePreview(){

 const costs=+$('#iCosts').value||0;const vat=costs*RULES.vatStandard;$('#iVat').value=vat.toFixed(2);

 const disb=disbInc?state.disbursements.filter(d=>d.matterId===mid&&!d.billedAt):[];

 const total=costs+vat+disbTotal;

async function saveInvoice(){
 const mid=$('#iMatter').value;const mt=state.matters.find(m=>m.id===mid);if(!mt){toast('select a matter');return}
 const costs=+$('#iCosts').value||0;const vat=+$('#iVat').value||0;
 const disbInc=$('#iDisb').value==='true';
 const disb=disbInc?state.disbursements.filter(d=>d.matterId===mid&&!d.billedAt):[];
 const disbTotal=disb.reduce((a,d)=>a+(d.total||0),0);
 const total=costs+vat+disbTotal;
 const drawdown=+$('#iDraw').value||0;
 const inv={id:'inv_'+uid(),ref:'INV-'+new Date().getFullYear()+'-'+(state.invoices.length+1).toString().padStart(4,'0'),matterId:mid,clientId:mt.clientId,adviserId:mt.responsibleSolicitorId,ts:new Date($('#iDate').value).getTime(),dateOf:$('#iDate').value,description:$('#iDesc').value||('Profit costs to '+$('#iDate').value),profitCosts:costs,vat,disbursements:disb.map(d=>({id:d.id,type:d.type,vendor:d.vendor,total:d.total,vatable:d.vatable})),drawdownFromClientAccount:drawdown,total,status:'issued',issuedAt:now(),paidAt:null};
 state.invoices.push(inv);await idbPut('invoices',inv);
 for(const d of disb){d.billedAt=now();d.invoiceId=inv.id;await idbPut('disbursements',d)}
 for(const t of state.timeEntries){if(t.matterId===mid&&!t.billedAt&&t.billable){t.billedAt=now();t.invoiceId=inv.id;await idbPut('timeEntries',t)}}
 if(drawdown>0){const ca={id:'ca_'+uid(),matterId:mid,clientId:mt.clientId,ts:now(),dateOf:isoDate(now()),direction:'out',amount:drawdown,source:'fee',notes:'Drawdown of earned fees per rule 4.3 · invoice '+inv.ref,reconciledAt:null};state.clientAccount.push(ca);await idbPut('clientAccount',ca);broadcastClientAccount(ca);const oa={id:'oa_'+uid(),matterId:mid,clientId:'',ts:now(),dateOf:isoDate(now()),direction:'in',amount:drawdown,source:'fee',notes:'Drawdown receipt from client a/c · invoice '+inv.ref};state.officeAccount.push(oa);await idbPut('officeAccount',oa)}
 await appendAudit('invoice.issued','User issued invoice',{invoiceId:inv.id,matterId:mid,total,drawdown});
 closeModal();toast('invoice saved');render();
}

function cpdForm(adviserId){
 return `
 <input type="hidden" id="cpdAdv" value="${adviserId}">
 <div class="row">
 <div class="field"><label>Date</label><input id="cpdDate" type="date" value="${isoDate(now())}"></div>
 <div class="field"><label>Type</label><select id="cpdType"><option>course</option><option>webinar</option><option>seminar</option><option>workshop</option><option>self-study</option><option>peer-review</option><option>work-based-learning</option></select></div>
 </div>
 <div class="row">
 <div class="field"><label>Topic</label><input id="cpdTopic" placeholder="e.g. AML refresher 2026"></div>
 <div class="field"><label>Provider</label><input id="cpdProv" placeholder="Law Society / CLT / SRA / etc."></div>
 </div>
 <div class="field"><label>Hours</label><input id="cpdHours" type="number" step="0.5" value="1"></div>
 <div class="actions"><button class="btn" onclick="closeModal()">cancel</button><button class="btn primary" onclick="saveCPD()">save</button></div>`;
}
async function saveCPD(){
 const aId=$('#cpdAdv').value;const a=state.advisers.find(x=>x.id===aId);if(!a)return;
 const c={ts:new Date($('#cpdDate').value).getTime(),topic:$('#cpdTopic').value,type:$('#cpdType').value,provider:$('#cpdProv').value,hours:+$('#cpdHours').value||0};
 if(!Array.isArray(a.cpdActivities))a.cpdActivities=[];
 a.cpdActivities.push(c);
 a.cpdHoursThisYear=(a.cpdActivities||[]).filter(x=>new Date(x.ts).getFullYear()===new Date().getFullYear()).reduce((s,x)=>s+(x.hours||0),0);
 a.updatedAt=now();await idbPut('advisers',a);
 await appendAudit('cpd.added','User added CPD',{adviserId:aId,topic:c.topic,hours:c.hours});
 broadcastUpsert('adviser.updated',a);
 closeModal();toast('CPD logged');render();
}
function breachForm(){
 return `
 <div class="row">
 <div class="field"><label>Date</label><input id="brDate" type="date" value="${isoDate(now())}"></div>
 <div class="field"><label>Material?</label><select id="brMat"><option value="true">material (must report)</option><option value="false">non-material</option></select></div>
 </div>
 <div class="field"><label>Summary</label><input id="brSum" placeholder="What happened"></div>
 <div class="field"><label>Rule(s) breached</label><input id="brRule" placeholder="e.g. SRA Accounts Rule 2.5"></div>
 <div class="field"><label>Remedy</label><textarea id="brRem" rows="2"></textarea></div>
 <div class="field"><label><input type="checkbox" id="brRep"> Reported to SRA</label></div>
 <div class="actions"><button class="btn" onclick="closeModal()">cancel</button><button class="btn primary" onclick="saveBreach()">save</button></div>`;
}
async function saveBreach(){
 const f=state.firm;if(!f){toast('set firm first');return}
 if(!Array.isArray(f.breachRegister))f.breachRegister=[];
 const b={ts:new Date($('#brDate').value).getTime(),material:$('#brMat').value==='true',summary:$('#brSum').value,rule:$('#brRule').value,remedy:$('#brRem').value,reported:$('#brRep').checked,reportedAt:$('#brRep').checked?now():null,loggedBy:state.settings.colpId||''};
 f.breachRegister.push(b);f.updatedAt=now();await idbPut('firms',f);
 await appendAudit('breach.logged','User logged breach',{material:b.material,rule:b.rule,reported:b.reported});
 closeModal();toast('breach logged');render();
}
async function paletteRun(){const q=($('#pInput').value||'').trim();if(!q)return;const ans=await answerQuestion(q);$('#pBody').innerHTML=`<div class="msg bot" style="margin:0">${formatBotText(ans.text)}<div class="src">${esc(ans.src||'')}</div></div>`}

// ═══════════════════════ BOOT ═══════════════════════
window.KONOMI={active:true,tier:'sovereign',prime:PRIME,version:VERSION,check:()=>({ok:true,tier:'sovereign',prime:PRIME})};

document.addEventListener('click',e=>{if(e.target.classList?.contains('palette-bg'))closePalette();if(e.target.classList?.contains('modal-bg'))closeModal()});
document.addEventListener('keypress',e=>{if(e.key==='Enter'&&document.activeElement?.id==='pInput')paletteRun()});
window.addEventListener('message',async e=>{const m=e.data;if(!m||typeof m!=='object')return;if(m.type==='fall-rpc'){let r={ok:false};if(m.action==='ping')r={ok:true,tool:TOOLNAME,prime:PRIME,version:VERSION};else if(m.action==='ask'&&m.question){const a=await answerQuestion(m.question);r={ok:true,answer:a.text,src:a.src}}else if(m.action==='snapshot')r={ok:true,matters:state.matters.length,clientAccount:clientAccountTotalHeld(),wip:totalWIP(),ytd:ytdRevenue()};try{e.source&&e.source.postMessage({type:'fall-rpc-r',id:m.id,result:r},'*')}catch(err){}}});

</script>
